<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinoplasti</title>
    <link rel="stylesheet" href="css/rinoplasti.css">
</head>
<body>

    <!-- HEADER -->
    <header class="site-header" id="siteHeader">
        <a href="#" class="site-header__logo">
            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/image-1777969316104.png" alt="Elit Klinik">
        </a>
    </header>

    <!-- SECTIONS -->

    <!-- HERO -->
    <section class="hero">
        <div class="hero__inner">
            <div class="hero__left">
                <span class="hero__badge">Piezo Teknolojisi ile</span>

                <h1 class="hero__title">
                    <span class="hero__title-orange">Doğal. Dengeli.</span>
                    <span class="hero__title-blue">Size Özel.</span>
                </h1>

                <div class="hero__features">
                    <div class="hero__feature">
                        <span class="hero__feature-icon">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/c4e7bf4a-9ff8-419b-8513-d4716e5d675e.png" alt="">
                        </span>
                        <div class="hero__feature-text">
                            <strong>Piezo Teknolojisi</strong>
                            <span>Daha az morluk</span>
                        </div>
                    </div>
                    <div class="hero__feature">
                        <span class="hero__feature-icon">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115049158.png" alt="">
                        </span>
                        <div class="hero__feature-text">
                            <strong>+5000 Mutlu Hasta</strong>
                            <span>Yüksek memnuniyet</span>
                        </div>
                    </div>
                    <div class="hero__feature">
                        <span class="hero__feature-icon">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115119641.png" alt="">
                        </span>
                        <div class="hero__feature-text">
                            <strong>Hızlı İyileşme</strong>
                            <span>Konforlu süreç</span>
                        </div>
                    </div>
                    <div class="hero__feature">
                        <span class="hero__feature-icon">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115145407.png" alt="">
                        </span>
                        <div class="hero__feature-text">
                            <strong>Dünyanın En Büyüğü</strong>
                            <span>18.000 m²'lik modern tesis</span>
                        </div>
                    </div>
                </div>

                <div class="hero__trust">
                    <div class="hero__trust-track">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120441951.png" alt="">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120457167.png" alt="">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120600436.png" alt="">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120531983.png" alt="">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120654233.png" alt="">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120441951.png" alt="" aria-hidden="true">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120457167.png" alt="" aria-hidden="true">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120600436.png" alt="" aria-hidden="true">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120531983.png" alt="" aria-hidden="true">
                        <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_120654233.png" alt="" aria-hidden="true">
                    </div>
                </div>

                <a href="#" class="hero__cta">Ücretsiz Ön Görüşme Al</a>

                <div class="hero__rating">
                    <div class="hero__rating-left">
                        <img class="hero__google" src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115225142.png" alt="Google">
                        <span class="hero__rating-score">4.8</span>
                        <span class="hero__stars">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115247274.png" alt="">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115247274.png" alt="">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115247274.png" alt="">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115247274.png" alt="">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115247274.png" alt="">
                        </span>
                    </div>
                    <div class="hero__rating-right">
                        <div class="hero__avatars">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115335410.png" alt="">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115335410.png" alt="">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115335410.png" alt="">
                            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/gorsel_2026-05-05_115335410.png" alt="">
                        </div>
                        <span class="hero__rating-text">+1000 Gerçek Hasta Yorumu</span>
                    </div>
                </div>
            </div>

            <div class="hero__right">
                <div class="hero__image-wrap">
                    <img class="hero__image" src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/header-gorsel%402x.png" alt="">
                </div>
            </div>
        </div>
    </section>

    <script src="js/rinoplasti.js"></script>
</body>
</html>
