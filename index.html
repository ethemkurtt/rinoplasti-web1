<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rinoplasti</title>
    <link rel="stylesheet" href="css/rinoplasti.css">
</head>
<body>

    <!-- HEADER -->
    <header class="site-header" id="siteHeader">
        <a href="#" class="site-header__logo">
            <img src="https://lp.elitklinik.com.tr/wp-content/uploads/2026/05/image-1777969316104.png" alt="Elit Klinik">
        </a>
    </header>

    <!-- SECTIONS -->

    <!-- HERO -->
    <section class="hero">
        <div class="hero__inner">
            <div class="hero__left">
                <span class="hero__badge">Piezo Teknolojisi ile</span>

                <h1 class="hero__title">
                    <span class="hero__title-orange">Doğal. Dengeli.</span>
                    <span class="hero__title-blue">Size Özel.</span>
                </h1>

                <div class="hero__features">
                    <div class="hero__feature">
                        <span class="hero__feature-icon">
                            <img src="REPLACE_ICON_PIEZO" alt="">
                        </span>
                        <div class="hero__feature-text">
                            <strong>Piezo Teknolojisi</strong>
                            <span>Daha az morluk</span>
                        </div>
                    </div>
                    <div class="hero__feature">
                        <span class="hero__feature-icon">
                            <img src="REPLACE_ICON_HAPPY" alt="">
                        </span>
                        <div class="hero__feature-text">
                            <strong>+5000 Mutlu Hasta</strong>
                            <span>Yüksek memnuniyet</span>
                        </div>
                    </div>
                    <div class="hero__feature">
                        <span class="hero__feature-icon">
                            <img src="REPLACE_ICON_FAST" alt="">
                        </span>
                        <div class="hero__feature-text">
                            <strong>Hızlı İyileşme</strong>
                            <span>Konforlu süreç</span>
                        </div>
                    </div>
                    <div class="hero__feature">
                        <span class="hero__feature-icon">
                            <img src="REPLACE_ICON_BUILDING" alt="">
                        </span>
                        <div class="hero__feature-text">
                            <strong>Dünyanın En Büyüğü</strong>
                            <span>18.000 m²'lik modern tesis</span>
                        </div>
                    </div>
                </div>

                <div class="hero__trust">
                    <img src="REPLACE_TRUST_STRIP" alt="Sertifikalar">
                </div>

                <a href="#" class="hero__cta">Ücretsiz Ön Görüşme Al</a>

                <div class="hero__rating">
                    <img class="hero__google" src="REPLACE_GOOGLE_RATING" alt="Google 4.8">
                    <div class="hero__rating-right">
                        <div class="hero__avatars">
                            <img src="REPLACE_AVATAR_1" alt="">
                            <img src="REPLACE_AVATAR_2" alt="">
                            <img src="REPLACE_AVATAR_3" alt="">
                            <img src="REPLACE_AVATAR_4" alt="">
                        </div>
                        <span class="hero__rating-text">+1000 Gerçek Hasta Yorumu</span>
                    </div>
                </div>
            </div>

            <div class="hero__right">
                <div class="hero__image-wrap">
                    <img class="hero__image" src="REPLACE_HERO_PHOTO" alt="">
                    <span class="hero__tag hero__tag--top">Doğal Görünüm</span>
                    <span class="hero__tag hero__tag--mid">Konforlu Süreç</span>
                    <span class="hero__tag hero__tag--bot">3D Teknolojisi</span>
                </div>
            </div>
        </div>
    </section>

    <script src="js/rinoplasti.js"></script>
</body>
</html>
